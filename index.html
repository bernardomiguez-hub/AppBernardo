<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Abrantes-Miguez</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..700;1,9..144,300..700&family=Nunito:wght@300;400&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --cream: #f6efe1;
      --ink: #2a221d;
      --gold: #b08856;
      --soft: #8a7461;
    }

    html, body { height: 100%; }

    body {
      background: var(--cream);
      color: var(--ink);
      font-family: 'Nunito', sans-serif;
      font-weight: 300;
      overflow-x: hidden;
      position: relative;
      min-height: 100vh;
    }

    /* Grão suave sobre o fundo */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.5;
      mix-blend-mode: multiply;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' stitchTiles='stitch'/%3E%3CfeColorMatrix values='0 0 0 0 0.15 0 0 0 0 0.12 0 0 0 0 0.10 0 0 0 0.18 0'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      z-index: 1;
    }

    /* Luz quente difusa */
    body::after {
      content: '';
      position: fixed;
      top: -30%; left: -20%;
      width: 90%; height: 90%;
      background: radial-gradient(circle at center, rgba(176, 136, 86, 0.18), transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    main {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 5rem 1rem;
      text-align: center;
    }

    .wordmark {
      font-family: 'Fraunces', serif;
      font-variation-settings: "opsz" 144;
      font-weight: 300;
      font-size: clamp(1.9rem, 8.5vw, 7rem);
      line-height: 1;
      color: var(--ink);
      letter-spacing: -0.02em;
      white-space: nowrap;
      opacity: 0;
      transform: translateY(28px);
      animation: rise 1.3s cubic-bezier(0.2, 0.7, 0.2, 1) 0.4s forwards;
    }

    .tagline {
      font-family: 'Fraunces', serif;
      font-style: italic;
      font-weight: 300;
      font-size: clamp(1.05rem, 2.2vw, 1.35rem);
      color: var(--soft);
      margin-top: 2.5rem;
      max-width: 34ch;
      line-height: 1.65;
      opacity: 0;
      animation: fadeIn 1.2s ease-out 1.4s forwards;
    }

    footer {
      position: absolute;
      bottom: 2.5rem;
      left: 0;
      right: 0;
      text-align: center;
      font-family: 'Fraunces', serif;
      font-style: italic;
      font-size: 0.85rem;
      letter-spacing: 0.15em;
      color: var(--soft);
      opacity: 0;
      animation: fadeIn 1s ease-out 2.1s forwards;
    }

    @keyframes fadeIn { to { opacity: 1; } }
    @keyframes rise { to { opacity: 1; transform: translateY(0); } }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
      .wordmark { opacity: 1; transform: none; }
    }
  </style>
</head>
<body>

  <main>
    <h1 class="wordmark">Abrantes&#8209;Miguez</h1>
    <p class="tagline">Dois nomes, um lar.</p>
  </main>

  <footer>abrantes-miguez.pt</footer>

</body>
</html>
