<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Abrantes-Miguez</title>
  <meta name="description" content="Abrantes-Miguez — Dois nomes, um lar.">
  <meta name="theme-color" content="#191620">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..700;1,9..144,300..700&family=Nunito:wght@300;400&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --night:  #191620;  /* fundo meia-noite */
      --ivory:  #f1e9e6;  /* nome, marfim quente */
      --rose:   #cf99a1;  /* acento rosé */
      --soft:   #94808b;  /* texto secundário */
      --glow-a: #b56b78;  /* aurora — rosa */
      --glow-b: #8a6a96;  /* aurora — ameixa */
    }

    html, body { height: 100%; }

    body {
      background: var(--night);
      color: var(--ivory);
      font-family: 'Nunito', sans-serif;
      font-weight: 300;
      overflow-x: hidden;
      position: relative;
      min-height: 100vh;
    }

    /* Aurora difusa que respira devagar atrás do nome */
    .aurora {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }
    .aurora span {
      position: absolute;
      border-radius: 50%;
      filter: blur(120px);
      mix-blend-mode: screen;
      will-change: transform;
    }
    .aurora .a {
      width: 52vw; height: 52vw;
      top: -8%; left: 4%;
      background: var(--glow-a);
      opacity: 0.34;
      animation: drift-a 22s ease-in-out infinite alternate;
    }
    .aurora .b {
      width: 46vw; height: 46vw;
      bottom: -6%; right: 6%;
      background: var(--glow-b);
      opacity: 0.30;
      animation: drift-b 26s ease-in-out infinite alternate;
    }

    /* Grão filmico subtil */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.06;
      mix-blend-mode: screen;
      z-index: 1;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    }

    main {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 5rem 1rem;
      text-align: center;
    }

    .wordmark {
      font-family: 'Fraunces', serif;
      font-variation-settings: "opsz" 144;
      font-weight: 300;
      font-size: clamp(1.9rem, 8.5vw, 7rem);
      line-height: 1;
      letter-spacing: -0.02em;
      white-space: nowrap;

      /* Sheen: marfim com uma faixa de luz que varre o nome uma vez */
      color: var(--ivory);
      background: linear-gradient(100deg,
        var(--ivory) 0%, var(--ivory) 38%,
        #fffaf6 50%,
        var(--ivory) 62%, var(--ivory) 100%);
      background-size: 250% 100%;
      background-position: 150% 0;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;

      opacity: 0;
      transform: translateY(28px);
      animation:
        rise 1.3s cubic-bezier(0.2, 0.7, 0.2, 1) 0.4s forwards,
        sheen 2.4s ease-out 1.5s forwards;
    }

    .divider {
      width: 132px;
      height: 1px;
      margin: 2.1rem 0 0;
      background: linear-gradient(90deg, transparent, var(--rose), transparent);
      transform: scaleX(0);
      opacity: 0;
      animation: grow 1.5s cubic-bezier(0.2, 0.7, 0.2, 1) 1.3s forwards;
    }

    .tagline {
      font-family: 'Fraunces', serif;
      font-style: italic;
      font-weight: 300;
      font-size: clamp(1.05rem, 2.2vw, 1.35rem);
      color: var(--rose);
      margin-top: 1.9rem;
      max-width: 34ch;
      line-height: 1.65;
      opacity: 0;
      animation: fadeIn 1.2s ease-out 1.7s forwards;
    }

    footer {
      position: absolute;
      bottom: 2.5rem;
      left: 0;
      right: 0;
      text-align: center;
      font-family: 'Fraunces', serif;
      font-style: italic;
      font-size: 0.85rem;
      letter-spacing: 0.15em;
      color: var(--soft);
      opacity: 0;
      animation: fadeIn 1s ease-out 2.3s forwards;
    }

    @keyframes fadeIn { to { opacity: 1; } }
    @keyframes rise   { to { opacity: 1; transform: translateY(0); } }
    @keyframes grow   { to { opacity: 0.85; transform: scaleX(1); } }
    @keyframes sheen  { to { background-position: -90% 0; } }

    @keyframes drift-a {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(8vw, 5vh) scale(1.12); }
    }
    @keyframes drift-b {
      from { transform: translate(0, 0) scale(1.05); }
      to   { transform: translate(-7vw, -4vh) scale(0.95); }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
      .wordmark { opacity: 1; transform: none; background-position: 0 0; }
      .divider  { opacity: 0.85; transform: scaleX(1); }
      .aurora .a, .aurora .b { animation: none; }
    }
  </style>
</head>
<body>

  <div class="aurora" aria-hidden="true">
    <span class="a"></span>
    <span class="b"></span>
  </div>

  <main>
    <h1 class="wordmark">Abrantes&#8209;Miguez</h1>
    <div class="divider" aria-hidden="true"></div>
    <p class="tagline">Dois nomes, um lar.</p>
  </main>

  <footer>abrantes-miguez.pt</footer>

</body>
</html>
